# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# .github/workflows/R-CMD-check.yaml  (modified for safeHavens)
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check
permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: macos-latest,   r: 'oldrel-1'}
          - {os: windows-latest, r: 'release'}
          - {os: windows-latest, r: 'oldrel-1'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # Tell cmdstanr where to look; safe no-op if not installed yet
      CMDSTAN: ~/.cmdstan

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      # ── Linux: spatial system libraries ───────────────────────────────────
      - name: Install spatial system libs (Linux)
        if: runner.os == 'Linux'
        run: |
          # Remove any stale ubuntugis PPA entries that cause version conflicts
          sudo rm -f /etc/apt/sources.list.d/*ubuntugis*.list \
                     /etc/apt/sources.list.d/*ubuntugis*.sources || true
          sudo apt-get update
          sudo apt-get install -y \
            libgdal-dev gdal-bin \
            libproj-dev proj-bin \
            libgeos-dev \
            libgeos++-dev

      # ── macOS: spatial system libraries via Homebrew ──────────────────────
      - name: Install spatial system libs (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gdal proj geos
          # Export PROJ_LIB so sf/rgdal can find projection data
          echo "PROJ_LIB=$(brew --prefix)/share/proj" >> $GITHUB_ENV
          # Help pkg-config and configure scripts find the brew libraries
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV

      # ── R package dependencies ────────────────────────────────────────────
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, checkhelper
          needs: check
          # Use "hard" deps only for speed; soft deps (Suggests) installed
          # selectively below where they matter (rstan, cmdstanr)
          dependencies: '"hard"'
          cache-version: ${{ matrix.config.r == 'devel' && github.run_id || '1' }}

      # ── Suggests needed by vignettes (skipped by dependencies: '"hard"') ───
      # geodata, DiagrammeR, rgbif etc. are Suggests so setup-r-dependencies
      # won't install them under hard mode — install them explicitly here.
      - name: Install vignette Suggests
        run: |
          install.packages(c(
            "geodata", "ggplot2", "patchwork", "spData",
            "DiagrammeR", "rgbif", "purrr", "tidyr",
            "sp", "lwgeom", "gstat", "MASS", "lattice",
            "withr", "rlang", "BH", "collapse","DHARMa", 
            "marginaleffects", "tidybayes", "pROC"
          ), repos = getOption("repos"))
        shell: Rscript {0}

      # ── sf: must be compiled from source on Linux to pick up system GDAL ──
      - name: Compile sf from source (Linux)
        if: runner.os == 'Linux'
        run: install.packages("sf", type = "source", repos = "https://cran.rstudio.com/")
        shell: Rscript {0}

      # ── sf: install binary on macOS (brew gdal satisfies linking) ─────────
      # Binary wheels on macOS are built against their own bundled GDAL, so
      # a plain install.packages() works fine there.

      # ── rstan: install with full C++ header tree (all platforms) ──────────
      # brms depends on rstan; rstan's StanHeaders/BH/RcppEigen headers must
      # all be present or compilation of Stan models fails at runtime.
      - name: Install rstan and Stan C++ dependencies
        run: |
          install.packages(
            "rstan",
            dependencies = c("Depends", "Imports", "LinkingTo"),
            repos = getOption("repos")
          )
        shell: Rscript {0}

      # ── cmdstanr ──────────────────────────────────────────────────────────
      - name: Install cmdstanr
        run: |
          install.packages(
            "cmdstanr",
            repos = c("https://stan-dev.r-universe.dev", getOption("repos"))
          )
        shell: Rscript {0}

      # Cache the CmdStan toolchain installation (~400 MB) so subsequent runs
      # skip the 5-minute compile step.  The cache key is OS + a version pin
      # file if you have one; otherwise it rebuilds when the runner image
      # rotates (acceptable).
      - name: Cache CmdStan
        id: cache-cmdstan
        uses: actions/cache@v4
        with:
          path: ~/.cmdstan
          key: cmdstan-${{ runner.os }}-${{ matrix.config.r }}-v2.38.0
          restore-keys: |
            cmdstan-${{ runner.os }}-${{ matrix.config.r }}-

      - name: Install CmdStan
        if: steps.cache-cmdstan.outputs.cache-hit != 'true'
        run: cmdstanr::install_cmdstan(cores = 2, quiet = TRUE)
        shell: Rscript {0}

      - name: Verify CmdStan path
        run: |
          cmdstanr::set_cmdstan_path(
            list.files("~/.cmdstan", pattern = "cmdstan-", full.names = TRUE)[1]
          )
          message("CmdStan path: ", cmdstanr::cmdstan_path())
        shell: Rscript {0}

      # ── R CMD check ───────────────────────────────────────────────────────
      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'