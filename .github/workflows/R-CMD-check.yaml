# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
# .github/workflows/R-CMD-check.yaml  (modified)
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: R-CMD-check
permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: macos-latest,   r: 'oldrel-1'}
          - {os: windows-latest, r: 'release'}
          - {os: windows-latest, r: 'oldrel-1'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      R_LIBS_USER: ${{ github.workspace }}/R/library

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - name: Set up R library path
        run: |
          lib <- file.path(Sys.getenv("GITHUB_WORKSPACE"), "R", "library")
          dir.create(lib, recursive = TRUE, showWarnings = FALSE)
          cat(sprintf('.libPaths(c("%s", .libPaths()))', lib),
              file = path.expand("~/.Rprofile"), append = TRUE)
          message("Library path set: ", lib)
        shell: Rscript {0}

      # Windows: ensure RTools C++ compiler is on PATH for CmdStan compilation
      - name: Set up RTools compiler (Windows)
        if: runner.os == 'Windows'
        run: |
          # r-lib/actions/setup-r already installs RTools; this ensures the
          # mingw64 bin directory is on PATH so CmdStan's Makefile can find g++
          $rtoolsPath = "C:\rtools44\x86_64-w64-mingw32.static.posix\bin"
          if (Test-Path $rtoolsPath) {
            echo "$rtoolsPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
        shell: pwsh

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::checkhelper
            any::testthat
            any::withr
            any::knitr
            any::rmarkdown
            any::ggplot2
            any::patchwork
            any::DiagrammeR
  
          needs: check
          dependencies: '"hard"' 

      # Install rstan with full LinkingTo/Depends/Imports tree to satisfy
      # Stan C++ header dependencies (BH, RcppEigen, RcppParallel, StanHeaders etc.)
      - name: Install rstan and Stan C++ dependencies
        run: |
          install.packages(
            "rstan",
            dependencies = c("Depends", "Imports", "LinkingTo"),
            repos = getOption("repos")
          )
        shell: Rscript {0}

      # cmdstanr must be installed from the Stan r-universe, not CRAN/RSPM
      - name: Install cmdstanr
        run: |
          install.packages(
            "cmdstanr",
            repos = c("https://stan-dev.r-universe.dev", getOption("repos"))
          )
        shell: Rscript {0}

      - name: Cache CmdStan
        uses: actions/cache@v4
        with:
          path: ~/.cmdstan
          key: cmdstan-${{ runner.os }}-${{ hashFiles('**/.cmdstan_version') }}
          restore-keys: cmdstan-${{ runner.os }}-

      - name: Install CmdStan
        run: |
          needs_install <- tryCatch({
            !dir.exists(cmdstanr::cmdstan_path())
          }, error = function(e) TRUE)
          if (needs_install) cmdstanr::install_cmdstan(cores = 2, quiet = TRUE)
        shell: Rscript {0}

      #  spatial-libs install & sf build for Linux
      - name: Install spatial system libs (Ubuntu 24.04+)
        if: runner.os == 'Linux'
        run: |
          sudo rm -f /etc/apt/sources.list.d/*ubuntugis*.list \
                     /etc/apt/sources.list.d/*ubuntugis*.sources || true
          sudo apt-get update
          sudo apt-get install -y \
            libgdal-dev gdal-bin \
            libproj-dev proj-bin \
            libgeos-dev \
            libgeos++-dev

      - name: Compile sf from source
        if: runner.os == 'Linux'
        run: install.packages("sf", type = "source", repos = "https://cran.rstudio.com/")
        shell: Rscript {0}

      # configure proj for macOS
      - name: Configure PROJ (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install proj
          echo "PROJ_LIB=$(brew --prefix)/share/proj" >> $GITHUB_ENV

      - name: Verify cmdstanr is findable
        run: |
          message(".libPaths(): ", paste(.libPaths(), collapse = ", "))
          library(cmdstanr)
          message("cmdstanr path: ", cmdstanr::cmdstan_path())
        shell: Rscript {0}
        env:
          R_LIBS: ${{ github.workspace }}/R/library
          R_LIBS_USER: ${{ github.workspace }}/R/library
          CMDSTAN: ~/.cmdstan

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
        env:
          R_LIBS: ${{ github.workspace }}/R/library
          R_LIBS_USER: ${{ github.workspace }}/R/library
          CMDSTAN: ~/.cmdstan