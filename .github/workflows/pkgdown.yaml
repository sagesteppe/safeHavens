# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: main
  pull_request:
    branches: main
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml
permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_LIBS_USER: ${{ github.workspace }}/R/library
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          ignored-packages: cmdstanr
          needs: website

      - name: Install spatial system libs (Ubuntu 24.04+)
        run: |
          sudo rm -f /etc/apt/sources.list.d/*ubuntugis*.list \
                     /etc/apt/sources.list.d/*ubuntugis*.sources || true
          sudo apt-get update
          sudo apt-get install -y \
            libgdal-dev gdal-bin \
            libproj-dev proj-bin \
            libgeos-dev \
            libgeos++-dev

      - name: Compile sf from source
        run: install.packages("sf", type = "source", repos = "https://cran.rstudio.com/")
        shell: Rscript {0}

      # Install rstan with full LinkingTo/Depends/Imports tree to satisfy
      # Stan C++ header dependencies (BH, RcppEigen, RcppParallel, StanHeaders etc.)
      - name: Install rstan and Stan C++ dependencies
        run: |
          install.packages(
            "rstan",
            dependencies = c("Depends", "Imports", "LinkingTo"),
            repos = getOption("repos")
          )
        shell: Rscript {0}

      # cmdstanr must be installed from the Stan r-universe, not CRAN/RSPM
      - name: Install cmdstanr
        run: |
          install.packages(
            "cmdstanr",
            repos = c("https://stan-dev.r-universe.dev", getOption("repos"))
          )
        shell: Rscript {0}

      - name: Cache CmdStan
        uses: actions/cache@v4
        with:
          path: ~/.cmdstan
          key: cmdstan-${{ runner.os }}-${{ hashFiles('**/.cmdstan_version') }}
          restore-keys: cmdstan-${{ runner.os }}-

      - name: Install CmdStan
        run: |
          needs_install <- tryCatch({
            !dir.exists(cmdstanr::cmdstan_path())
          }, error = function(e) TRUE)
          if (needs_install) cmdstanr::install_cmdstan(cores = 2, quiet = TRUE)
        shell: Rscript {0}

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs